[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Runs as a cron job, not a persistent service
# Set SCHEDULE_CRON env var in Railway dashboard to adjust schedule:
#   "0 14 * * *"     = daily at 2 PM UTC
#   "0 14 */2 * *"   = every 2 days at 2 PM UTC
#   "0 14 * * 1,4"   = Mon & Thu at 2 PM UTC
cronSchedule = "0 11 * * *"
